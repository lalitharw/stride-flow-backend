name: Build and Push to ECR

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs: 
      environment:
        description: "Select Deployment environment"
        required: true
        default: build-and-push-to-ecr
        type: choice
        options:
          - build-and-push-to-ecr
          - build-and-deploy

jobs:
  build-image-push-to-ecr:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      ECR_BACKEND_REPO: stride_flow_backend_ecr
      ECR_CADDY_REPO: stride_flow_caddy_ecr
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: COnfigure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{secrets.AWS_ACCESS_KEY_ID}}
          aws-secret-access-key: ${{secrets.AWS_SECRET_ACCESS_KEY}}
          aws-region: ${{env.AWS_REGION}}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses:  aws-actions/amazon-ecr-login@v2

      - name: Build and Push to Backend ECR
        env:
          REGISTRY: ${{steps.login-ecr.outputs.registry}}
          REPOSITORY: ${{env.ECR_BACKEND_REPO}}
          IMAGE_TAG: ${{github.sha}}
        run: |
          docker build -f dockerfile.prod -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
  
      - name: Build and Push to Caddy ECR
        env:
          REGISTRY: ${{steps.login-ecr.outputs.registry}}
          REPOSITORY: ${{env.ECR_CADDY_REPO}}
          IMAGE_TAG: ${{github.sha}}
        run: |
          docker build -f dockerfile.caddy -t $REGISTRY/$REPOSITORY:$IMAGE_TAG .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG

  deploy-to-server:
    needs: build-image-push-to-ecr
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' &&
      github.event.inputs.environment == 'build-and-deploy'
    steps:
      - name: Trigger ASG Instance Refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "stride-flow-asg"
            --preferences '{"MinHealthlyPercentage":50, "InstanceWarmup":300}'

